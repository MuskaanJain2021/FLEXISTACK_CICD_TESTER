name: FlexiStack CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      # 1. Added 'cppcheck' to the install list
      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc valgrind cppcheck

      # 2. NEW: Static Analysis Step
      # This scans your source code for logic errors, null pointers, and style issues.
      - name: Run Cppcheck Static Analysis
        run: |
          cppcheck --enable=warning,style,performance,portability \
          --error-exitcode=1 \
          --suppress=unusedFunction \
          --suppress=missingIncludeSystem \
          -I include/ src/
          
      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build Project
        run: cmake --build build

      - name: Run Unity Tests
        run: ./build/run_flexi_tests

      - name: Memory Leak Detection
        run: valgrind --leak-check=full --error-exitcode=1 ./build/run_flexi_tests