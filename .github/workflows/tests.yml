name: FlexiStack CI/CD

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ] # Triggers CD on version tags
  pull_request:
    branches: [ main, master ]

jobs:
  # --- STAGE 1: Continuous Integration (CI) ---
  # This job ensures the code is safe, logical, and leak-free.
  build-and-test:
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc valgrind cppcheck

      - name: Run Cppcheck Static Analysis
        run: |
          cppcheck --enable=warning,style,performance,portability \
          --error-exitcode=1 \
          --suppress=unusedFunction \
          --suppress=missingIncludeSystem \
          -I include/ src/

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build Project
        run: cmake --build build

      - name: Run Unity Tests
        run: ./build/run_flexi_tests

      - name: Memory Leak Detection (Valgrind)
        run: valgrind --leak-check=full --error-exitcode=1 ./build/run_flexi_tests

  # --- STAGE 2: Continuous Delivery (CD) ---
  # This job only runs if Stage 1 passes AND you pushed a version tag.
  generate-docs:
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
        
      - name: Run Doxygen
        run: |
          # No need to generate or sed anymore! 
          # Just run it using your committed Doxyfile.
          doxygen Doxyfile

      - name: Upload Documentation Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlexiStack-API-Docs
          path: html/